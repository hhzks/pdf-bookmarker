services:
  - type: web
    name: pdf-bookmarker-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: VERIFICATION_MODEL
        sync: false   # optional; defaults to gemini:gemini-3.5-flash
      - key: OCR_MAX_PAGES
        sync: false   # optional; defaults to 50
